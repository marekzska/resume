name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build the library first — the site typecheck, tests, and build resolve `warm-motion` from its dist.
      - run: npm run build
      - run: npm run lint
      - run: npm test
